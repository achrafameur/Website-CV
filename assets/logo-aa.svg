<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gc6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ce8ff"/>
      <stop offset="50%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- fond sombre -->
  <rect width="400" height="400" fill="#050d1a"/>

  <!-- forme cut corner -->
  <polygon points="75,5 395,5 395,325 325,395 5,395 5,75" fill="#050d1a" stroke="url(#gc6)" stroke-width="3"/>

  <!-- inner border -->
  <polygon points="88,18 382,18 382,312 312,382 18,382 18,88" fill="none" stroke="rgba(79,142,247,0.08)" stroke-width="1.5"/>

  <!-- coin diagonales accent -->
  <line x1="5" y1="75" x2="75" y2="5" stroke="url(#gc6)" stroke-width="3" opacity="0.45"/>
  <line x1="325" y1="395" x2="395" y2="325" stroke="url(#gc6)" stroke-width="3" opacity="0.45"/>

  <!-- AA -->
  <text x="200" y="240"
    font-family="Syne, sans-serif"
    font-size="180"
    font-weight="800"
    fill="url(#gc6)"
    text-anchor="middle"
    letter-spacing="-10">AA</text>

  <!-- sous-titre -->
  <text x="200" y="295"
    font-family="DM Sans, sans-serif"
    font-size="18"
    font-weight="500"
    fill="#4f8ef7"
    text-anchor="middle"
    letter-spacing="10"
    opacity="0.6">FULL-STACK</text>
</svg>
